version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: gridloan
      POSTGRES_PASSWORD: gridloan_dev
      POSTGRES_DB: gridloan_waitlist
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U gridloan -d gridloan_waitlist']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
